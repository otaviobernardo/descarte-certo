<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Descarte Certo</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container" style="max-width:420px; padding-top:60px;">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:3rem;">♻️</div>
      <h1 style="font-size:1.5rem; margin-top:8px;">Descarte Certo</h1>
      <p style="color:var(--texto-suave); font-size:.9rem;">Joinville — Descarte responsável</p>
    </div>

    <div class="card">
      <h1>Entrar</h1>
      <p class="sub">Acesse sua conta</p>

      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">

      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••">

      <button class="btn" onclick="fazerLogin()">Entrar</button>
      <div id="msg" class="msg"></div>
    </div>

    <div class="link-aux">
      Não tem conta? <a href="/cadastro">Cadastre-se</a>
    </div>
  </div>

  <script src="/static/js/utils.js"></script>
  <script>
    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      if (!email || !senha) return mostrarMsg('msg', 'Preencha todos os campos.', 'erro');

      const body = new FormData();
      body.append('email', email);
      body.append('senha', senha);

      const res = await fetch('/api/login', { method: 'POST', body });
      const data = await res.json();

      if (!res.ok) return mostrarMsg('msg', data.detail, 'erro');
      salvarUsuario(data.usuario);
      window.location.href = '/home';
    }
  </script>
</body>
</html>
